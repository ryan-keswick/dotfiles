set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"

# Set True Colour
set-option -sa terminal-overrides ",xterm*:Tc"
if-shell "uname | grep -q Darwin" \
  "set-option -g default-shell $SHELL" \
  "set-option -g default-shell /usr/bin/zsh"
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Theming
set -g @catppuccin_flavour 'mocha'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-dir '~/.backup/tmux-resurrect'
set -g @resurrect-processes 'otter claude'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# OSC52 passthrough on Linux/SSH; on Mac pbcopy is auto-detected by tmux-yank
set -g set-clipboard on
if-shell 'uname | grep -q Darwin' \
  '' \
  'set -g @override_copy_command "tmux load-buffer -"'

# OSC52 passthrough on Linux/SSH; on Mac pbcopy is auto-detected by tmux-yank
set -g set-clipboard on
if-shell 'uname | grep -q Darwin' \
  '' \
  'set -g @override_copy_command "tmux load-buffer -"'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

run '~/.tmux/plugins/tpm/tpm'

# tmux-continuum only injects its periodic-save hook into status-right when it
# decides no other tmux server is running. On devbox startup the restore step
# launches a throwaway tmux server, which trips that guard, so the hook is never
# added and sessions stop auto-saving (leaving only the shutdown save). Append
# the save interpolation explicitly, after the theme has set status-right, so the
# interval save always runs. (On a clean local start continuum may also add it;
# the duplicate is harmless because continuum_save.sh is interval-gated.)
set -ag status-right '#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)'
